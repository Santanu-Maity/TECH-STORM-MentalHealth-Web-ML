<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mental Health Prediction</title>
  <link rel="stylesheet" href="../static/style.css">
</head>
<body>
  <h2>Mental Health Predictor</h2>
  <form id="form">
    <label>Sleep Hours:</label><input type="number" id="sleep_hours"><br>
    <label>Work Stress (1–10):</label><input type="number" id="work_stress"><br>
    <label>Screen Time (hrs):</label><input type="number" id="screen_time"><br>
    <label>Exercise Hours:</label><input type="number" id="exercise_hours"><br>
    <label>Food Quality (1–5):</label><input type="number" id="food_quality"><br>
    <label>Financial Stress (1–5):</label><input type="number" id="financial_stress"><br>
    <label>Introvert/Extrovert:</label>
    <select id="introvert_extrovert">
      <option value="introvert">Introvert</option>
      <option value="extrovert">Extrovert</option>
    </select><br><br>
    <button type="button" onclick="predict()">Predict</button>
  </form>
  <h3 id="result"></h3>

  <script>
    async function predict() {
      const data = {
        sleep_hours: Number(document.getElementById("sleep_hours").value),
        work_stress: Number(document.getElementById("work_stress").value),
        screen_time: Number(document.getElementById("screen_time").value),
        exercise_hours: Number(document.getElementById("exercise_hours").value),
        food_quality: Number(document.getElementById("food_quality").value),
        financial_stress: Number(document.getElementById("financial_stress").value),
        introvert_extrovert: document.getElementById("introvert_extrovert").value
      };

      const res = await fetch("/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
      });

      const result = await res.json();
      document.getElementById("result").innerText = "Predicted Mental State: " + result.mental_state;
    }
  </script>
</body>
</html>
